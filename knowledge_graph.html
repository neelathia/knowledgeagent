<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OKA — Knowledge Graph · Neela Thiagarajan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#000000;
  --surface:#0a0a0a;
  --surface-2:#111111;
  --surface-3:#191919;
  --border:#1e1e1e;
  --border-light:#2a2a2a;
  --white:#ffffff;
  --text:#e8e8e8;
  --text-dim:#888888;
  --text-muted:#444444;
  --green:#00ff88;
  --green-dim:rgba(0,255,136,0.08);
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--black);
  color:var(--text);
  height:100vh;overflow:hidden;
}

/* Grain */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none;z-index:999;
}

/* ── TOPBAR ── */
.topbar{
  position:fixed;inset:0 0 auto 0;
  height:56px;z-index:100;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:12px;
}

.topbar-logo{
  font-family:'Poppins',sans-serif;font-size:15px;font-weight:800;
  color:var(--white);letter-spacing:-.01em;
  display:flex;align-items:center;gap:3px;flex-shrink:0;
}
.topbar-logo span{color:var(--green);}

.topbar-divider{width:1px;height:20px;background:var(--border-light);flex-shrink:0;}

.topbar-info{display:flex;flex-direction:column;gap:1px;min-width:280px;}
.topbar-title{
  font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;
  color:var(--white);white-space:nowrap;
}
.topbar-title span{color:var(--green);}
.topbar-sub{font-size:11px;color:var(--text-muted);white-space:nowrap;font-family:'DM Mono',monospace;}

.topbar-right{display:flex;align-items:center;gap:8px;}

.legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.legend-item{
  display:flex;align-items:center;gap:5px;
  font-size:10px;color:var(--text-muted);
  cursor:pointer;user-select:none;transition:color .2s;
  white-space:nowrap;
  font-family:'DM Mono',monospace;
  letter-spacing:.04em;
}
.legend-item:hover{color:var(--text);}
.legend-dot{width:8px;height:8px;border-radius:50%;}

.searchbar{display:flex;gap:6px;align-items:center;}
.searchbar select{
  background:var(--surface-2);
  border:1px solid var(--border-light);
  border-radius:8px;
  padding:7px 12px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:11px;
  outline:none;width:280px;min-width:180px;
  letter-spacing:.02em;
}
.searchbar select:focus{border-color:rgba(0,255,136,.3);}
.searchbar button{
  padding:7px 14px;border-radius:8px;
  border:1px solid var(--border-light);
  background:var(--green-dim);
  color:var(--text);font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.searchbar button:hover{background:rgba(0,255,136,.15);border-color:rgba(0,255,136,.3);color:var(--green);}

.pill{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:100px;border:1px solid;}
.pill-green{color:var(--green);border-color:rgba(0,255,136,.2);background:var(--green-dim);}
.pill-white{color:var(--text-muted);border-color:var(--border-light);background:transparent;}

.nav-link{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text-muted);text-decoration:none;
  padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s;
}
.nav-link:hover{color:var(--white);border-color:var(--border-light);}

/* ── GRAPH ── */
#graph-container{position:fixed;inset:0;top:56px;}
svg{width:100%;height:100%;}

.link{stroke:var(--border-light);stroke-width:1;fill:none;}
.link.cross{stroke-dasharray:4 3;stroke:var(--border);}
.link.hier{stroke:#2a2a2a;stroke-width:1.5;}

.node-group{cursor:pointer;}
.node-circle{transition:filter .2s,opacity .2s;stroke:rgba(255,255,255,0.06);stroke-width:1;}
.node-label{font-size:10px;fill:var(--text-muted);text-anchor:middle;pointer-events:none;transition:fill .2s,opacity .2s;font-family:'DM Mono',monospace;}
.node-group:hover .node-label{fill:var(--text);}
.node-group.selected .node-circle{stroke:rgba(255,255,255,.5);stroke-width:2;opacity:1;}
.node-group.selected .node-label{fill:var(--white);font-weight:500;}
.node-ring{fill:none;stroke-width:2.5;opacity:0;transition:opacity .25s;}
.node-group.selected .node-ring{opacity:0.2;}

/* ── BREADCRUMB ── */
.breadcrumb{
  position:fixed;top:64px;left:14px;z-index:60;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);
  display:flex;flex-wrap:wrap;gap:4px;align-items:center;
  max-width:calc(100vw - 440px);letter-spacing:.04em;
}
.breadcrumb .sep{opacity:.3;}
.breadcrumb .bc-item{cursor:pointer;transition:color .15s;}
.breadcrumb .bc-item:hover{color:var(--text);}
.breadcrumb .bc-item.active{color:var(--text);font-weight:500;}

/* ── SIDE PANEL ── */
.panel{
  position:fixed;top:56px;right:0;width:380px;bottom:0;z-index:50;
  background:rgba(10,10,10,.96);
  backdrop-filter:blur(20px);
  border-left:1px solid var(--border);
  overflow-y:auto;padding:22px 20px;
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  transform:translateX(100%);
}
.panel.open{transform:translateX(0);}
.panel::-webkit-scrollbar{width:2px;}
.panel::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:4px;}

.panel-close{
  position:absolute;top:12px;right:14px;
  background:none;border:none;color:var(--text-muted);
  font-size:20px;cursor:pointer;line-height:1;
}
.panel-close:hover{color:var(--text);}

.panel-badge{
  display:inline-block;font-family:'DM Mono',monospace;
  font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;
  padding:3px 8px;border-radius:4px;margin-bottom:10px;
}
.panel-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:17px;margin-bottom:6px;line-height:1.25;color:var(--white);}
.panel-desc{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:14px;}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 6px;}
.meta{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px;color:var(--text);}
.meta .k{display:block;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:4px;}

.chiprow{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.chip{
  font-family:'DM Mono',monospace;font-size:10px;
  padding:3px 8px;border-radius:100px;
  border:1px solid var(--border-light);color:var(--text-muted);
  background:var(--surface-2);
}

.panel-section-label{
  font-family:'DM Mono',monospace;font-size:9px;font-weight:500;
  text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);
  margin-bottom:8px;margin-top:16px;
}

.panel-children{display:flex;flex-direction:column;gap:5px;}
.panel-child{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;font-size:13px;
  cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;gap:9px;
}
.panel-child:hover{background:var(--surface-3);border-color:var(--border-light);}
.child-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.child-label{color:var(--text);font-size:12px;}
.child-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:2px;letter-spacing:.03em;}

.preview{
  white-space:pre-wrap;font-family:'DM Mono',monospace;font-size:11px;
  line-height:1.55;color:var(--text-dim);
  background:var(--surface-3);border:1px solid var(--border);
  padding:12px;border-radius:8px;margin-top:8px;
}

/* ── TOAST ── */
.toast{
  position:fixed;left:14px;bottom:14px;z-index:120;
  width:min(520px,calc(100vw - 28px));
  background:var(--surface-2);border:1px solid var(--border-light);
  border-radius:10px;padding:14px 16px;
  box-shadow:0 18px 60px rgba(0,0,0,.8);display:none;
}
.toast.open{display:block;}
.toast .t{font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;margin-bottom:6px;color:var(--white);}
.toast .b{font-size:12px;color:var(--text-muted);line-height:1.5;font-family:'DM Mono',monospace;}
.toast .x{position:absolute;right:10px;top:10px;border:none;background:none;color:var(--text-muted);font-size:18px;cursor:pointer;}

/* ── ZOOM CONTROLS ── */
.zoom-controls{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:60;display:flex;gap:3px;
  background:rgba(10,10,10,.9);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:100px;padding:5px;
}
.zoom-btn{
  width:34px;height:34px;border-radius:50%;
  background:transparent;border:1px solid var(--border);
  color:var(--text-dim);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
}
.zoom-btn:hover{background:var(--surface-2);color:var(--white);border-color:var(--border-light);}

/* ── LOADING ── */
#loading-overlay{
  position:fixed;inset:0;top:56px;background:var(--black);
  z-index:200;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
#loading-overlay p{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-muted);letter-spacing:.04em;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">OKA<span>.</span></div>
  <div class="topbar-divider"></div>
  <div class="topbar-info">
    <div class="topbar-title">Operational <span>Knowledge Graph</span></div>
    <div class="topbar-sub" id="topbarSub">Loading knowledge base...</div>
  </div>
  <div class="topbar-right">
    <div class="legend" id="legend"></div>
    <div class="searchbar">
      <select id="demo-query"></select>
      <button id="demo-search">Run retrieval demo</button>
    </div>
    <span class="pill pill-green" id="nodePill">— nodes</span>
    <span class="pill pill-white" id="chunkPill">— chunks</span>
    <a href="agent.html" class="nav-link">Agent →</a>
    <a href="index.html" class="nav-link">Editor →</a>
    <a href="ingest.html" class="nav-link">Ingest →</a>
<a href="discover.html" class="nav-link">Discover →</a>
  </div>
</div>

<div id="loading-overlay">
  <p id="loadingMsg">⟳ Loading knowledge base from manifest...</p>
</div>

<div class="breadcrumb" id="breadcrumb"></div>
<div id="graph-container"><svg id="graph"></svg></div>

<div class="panel" id="panel">
  <button class="panel-close" id="panel-close">&times;</button>
  <div id="panel-content"></div>
</div>

<div class="toast" id="toast">
  <button class="x" id="toast-close">&times;</button>
  <div class="t" id="toast-title"></div>
  <div class="b" id="toast-body"></div>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-reset">⇳</button>
  <button class="zoom-btn" id="zoom-out">−</button>
</div>

<script>
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

const INTENT_COLOR = {
  DO:'#00ff88',FIX:'#ff4d4d',CHECK:'#4d9fff',CONSTRAINT:'#ffb84d',LEARN:'#c084fc'
};

const CAT = {
  root:    {color:'#ffb84d',label:'KB Root'},
  l1:      {color:'#4d9fff',label:'L1 Service'},
  l2:      {color:'#00ff88',label:'L2 E2E Process'},
  l3:      {color:'#c084fc',label:'L3 Category'},
  l4:      {color:'#ff4d4d',label:'L4 Process Group'},
  l5:      {color:'#ffd166',label:'L5 Process'},
  howto:   {color:'#e8e8e8',label:'How-To Doc'},
  chunk:   {color:'#00ff88',label:'Knowledge Chunk'},
  system:  {color:'#d97706',label:'System'},
  data:    {color:'#b45309',label:'Data Entity'},
  process: {color:'#7c3aed',label:'Related Process'},
};

function nodeColor(d){
  if(d.cat==='chunk') return INTENT_COLOR[d.intent] || CAT.chunk.color;
  return CAT[d.cat]?.color || '#888';
}

function buildGraph(docs){
  const nodes = [];
  const crossLinks = [];
  const nodeMap = {};

  function addNode(n){ nodes.push(n); nodeMap[n.id]=n; return n; }

  addNode({id:'root',label:'Operational\nKnowledge Base',cat:'root',r:30,depth:0,
    desc:'Central operational knowledge base. All How-To content organized by enterprise service → process → document → knowledge chunk.',
    children:[]});

  const l1Set=new Set(), l2Set=new Set(), l3Set=new Set(), l4Set=new Set();
  docs.forEach(doc=>{
    const h=doc.hierarchy||{};
    if(h.l1) l1Set.add(h.l1); if(h.l2) l2Set.add(h.l2);
    if(h.l3) l3Set.add(h.l3); if(h.l4) l4Set.add(h.l4);
  });

  const hierIds=['root'];
  if(l1Set.size){const l1=[...l1Set][0];addNode({id:'l1',label:l1.replace(/ /g,'\n'),cat:'l1',r:24,depth:1,parent:'root',desc:`L1 Enterprise Service. Entry point for all ${l1.toLowerCase()} knowledge.`,children:[]});nodeMap['root'].children=['l1'];hierIds.push('l1');}
  if(l2Set.size){const l2=[...l2Set][0];addNode({id:'l2',label:l2.replace(/ /g,'\n'),cat:'l2',r:21,depth:2,parent:'l1',desc:`L2 E2E Process.`,children:[]});if(nodeMap['l1'])nodeMap['l1'].children=['l2'];hierIds.push('l2');}
  if(l3Set.size){const l3=[...l3Set][0];addNode({id:'l3',label:l3.replace(/ /g,'\n'),cat:'l3',r:19,depth:3,parent:'l2',desc:`L3 Category.`,children:[]});if(nodeMap['l2'])nodeMap['l2'].children=['l3'];hierIds.push('l3');}
  if(l4Set.size){const l4=[...l4Set][0];addNode({id:'l4',label:l4.replace(/ /g,'\n'),cat:'l4',r:17,depth:4,parent:'l3',desc:`L4 Process Group.`,children:[]});if(nodeMap['l3'])nodeMap['l3'].children=['l4'];hierIds.push('l4');}

  const allSystems=new Set(), allDataEntities=new Set(), allRelatedProcesses=new Set();

  docs.forEach((doc,di)=>{
    const docId=doc.doc_id, process=doc.process;
    const l5label=doc.hierarchy?.l5||doc.title;
    const l5id=`l5-${docId}`, htId=`howto-${docId}`;
    addNode({id:l5id,label:l5label.replace(/ /g,'\n'),cat:'l5',r:16,depth:5,parent:'l4',desc:`L5 Process. ${doc.title}. Process code: ${process}.`,children:[htId]});
    if(nodeMap['l4']){if(!nodeMap['l4'].children)nodeMap['l4'].children=[];nodeMap['l4'].children.push(l5id);}
    hierIds.push(l5id);
    addNode({id:htId,label:`${docId}\n${doc.title?.split(' ').slice(0,3).join(' ')||'How-To'}`,cat:'howto',r:18,depth:6,parent:l5id,doc_id:docId,desc:`${doc.title}. Source: ${doc.source||'system validation testing'}. Author: ${doc.author||'Neela Thiagarajan'}.`,children:[],docTitle:doc.title});
    const chunkIds=[];
    Object.entries(doc.sections||{}).forEach(([secName,sec])=>{
      if(!sec.content?.trim()) return;
      const cid=`${docId}-${secName}`;
      addNode({id:cid,label:secName,cat:'chunk',r:20,intent:sec.intent||'LEARN',depth:7,parent:htId,process,doc_id:docId,section:secName,content:sec.content,keywords:sec.keywords||[],business_capability:sec.business_capability||'',business_outcome:sec.business_outcome||'',process_stage:sec.process_stage||'',data_triggers:sec.data_triggers||'',desc:`${sec.intent||'LEARN'} · ${secName}. ${sec.business_outcome||''}`,children:[]});
      chunkIds.push(cid);
    });
    nodeMap[htId].children=chunkIds;
    (doc.systems||[]).forEach(s=>allSystems.add(s));
    (doc.data_entities||[]).forEach(e=>allDataEntities.add(e));
    (doc.related_processes||[]).forEach(p=>allRelatedProcesses.add(p));
    const docChunks=chunkIds.map(id=>nodeMap[id]);
    const doChunk=docChunks.find(c=>c.intent==='DO');
    const fixChunk=docChunks.find(c=>c.intent==='FIX');
    const ruChunk=docChunks.find(c=>c.intent==='CONSTRAINT');
    if(doChunk){(doc.systems||[]).forEach(s=>crossLinks.push({source:doChunk.id,target:`sys-${s}`,label:'created in'}));(doc.related_processes||[]).forEach(p=>crossLinks.push({source:doChunk.id,target:`proc-${p}`,label:'used by'}));}
    if(fixChunk)(doc.systems||[]).slice(0,2).forEach(s=>crossLinks.push({source:fixChunk.id,target:`sys-${s}`,label:'relates to'}));
    if(ruChunk)(doc.systems||[]).slice(0,1).forEach(s=>crossLinks.push({source:ruChunk.id,target:`sys-${s}`,label:'enforced by'}));
    (doc.data_entities||[]).forEach((e,i)=>{
      const eid=`data-${e}`;
      if(i%4===0&&doChunk) crossLinks.push({source:doChunk.id,target:eid,label:'produces'});
      if(i%4===1&&ruChunk) crossLinks.push({source:ruChunk.id,target:eid,label:'governs'});
      if(i%4===2&&fixChunk) crossLinks.push({source:fixChunk.id,target:eid,label:'troubleshoots'});
      if(i%4===3&&doChunk) crossLinks.push({source:doChunk.id,target:eid,label:'references'});
      if(i%4>3&&doChunk) crossLinks.push({source:doChunk.id,target:eid,label:'uses'});
    });
    (doc.data_entities||[]).forEach(e=>{const eid=`data-${e}`;const alreadyConnected=crossLinks.some(l=>l.target===eid||l.source===eid);if(!alreadyConnected&&doChunk)crossLinks.push({source:doChunk.id,target:eid,label:'uses'});});
  });

  allSystems.forEach(s=>{const id=`sys-${s}`;if(!nodeMap[id])addNode({id,label:s.replace(/ /g,'\n'),cat:'system',r:15,desc:`System involved in enterprise asset management operations.`});});
  allDataEntities.forEach(e=>{const id=`data-${e}`;if(!nodeMap[id])addNode({id,label:e.replace(/ /g,'\n'),cat:'data',r:13,desc:`Key data entity used across processes.`});});
  allRelatedProcesses.forEach(p=>{const id=`proc-${p}`;if(!nodeMap[id])addNode({id,label:p.replace(/ /g,'\n'),cat:'process',r:15,desc:`Related process that references How-To documentation.`});});

  const treeLinks=[];
  nodes.forEach(n=>{(n.children||[]).forEach(cid=>{if(nodeMap[cid])treeLinks.push({source:n.id,target:cid,type:'tree'});});});
  const validCross=crossLinks.filter(l=>nodeMap[l.source]&&nodeMap[l.target]).map(l=>({...l,type:'cross'}));
  return {nodes, nodeMap, allLinks:[...treeLinks,...validCross], hierIds};
}

function renderGraph(docs){
  const {nodes, nodeMap, allLinks, hierIds} = buildGraph(docs);
  const W=window.innerWidth, H=window.innerHeight-56;
  const svg=d3.select('#graph').attr('width',W).attr('height',H);
  const g=svg.append('g');
  const zoom=d3.zoom().scaleExtent([0.15,6]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom);
  const initT=d3.zoomIdentity.translate(W*0.4,H*0.52).scale(0.78);
  svg.call(zoom.transform,initT);

  const l5ids=nodes.filter(n=>n.cat==='l5').map(n=>n.id);
  const htIds=nodes.filter(n=>n.cat==='howto').map(n=>n.id);
  const chkIds=nodes.filter(n=>n.cat==='chunk').map(n=>n.id);
  const sysIds=nodes.filter(n=>n.cat==='system').map(n=>n.id);
  const datIds=nodes.filter(n=>n.cat==='data').map(n=>n.id);
  const prIds=nodes.filter(n=>n.cat==='process').map(n=>n.id);

  function xTarget(d){
    if(hierIds.includes(d.id)) return -W*0.34;
    if(htIds.includes(d.id)) return -W*0.18;
    if(chkIds.includes(d.id)) return -W*0.02;
    if(sysIds.includes(d.id)) return W*0.28;
    if(datIds.includes(d.id)) return -W*0.28;
    if(prIds.includes(d.id)) return W*0.18;
    return 0;
  }
  function yTarget(d){
    if(hierIds.includes(d.id)){const i=hierIds.indexOf(d.id);return -H*0.42+i*72;}
    if(htIds.includes(d.id)){const i=htIds.indexOf(d.id);return -H*0.3+i*140;}
    if(chkIds.includes(d.id)){const i=chkIds.indexOf(d.id);const perDoc=6;const docIdx=Math.floor(i/perDoc);const secIdx=i%perDoc;return -H*0.38+docIdx*140+secIdx*72;}
    if(sysIds.includes(d.id)){const i=sysIds.indexOf(d.id);return -H*0.2+i*90;}
    if(datIds.includes(d.id)){const i=datIds.indexOf(d.id);return -H*0.3+i*80;}
    if(prIds.includes(d.id)){const i=prIds.indexOf(d.id);return -H*0.2+i*90;}
    return 0;
  }

  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(allLinks).id(d=>d.id).distance(d=>d.type==='cross'?200:d.type==='tree'&&hierIds.includes(d.source.id||d.source)?82:95).strength(d=>d.type==='cross'?0.07:0.3))
    .force('charge',d3.forceManyBody().strength(d=>-(d.r*d.r*3.0)))
    .force('collision',d3.forceCollide().radius(d=>d.r+18).strength(0.85))
    .force('center',d3.forceCenter(0,0))
    .force('x',d3.forceX(d=>xTarget(d)).strength(0.26))
    .force('y',d3.forceY(d=>yTarget(d)).strength(0.26))
    .alphaDecay(0.025).velocityDecay(0.3);

  const link=g.append('g').selectAll('line').data(allLinks).join('line')
    .attr('class',d=>{ if(d.type==='cross') return 'link cross'; if(hierIds.includes(d.source.id||d.source)) return 'link hier'; return 'link'; });

  const node=g.append('g').selectAll('.node-group').data(nodes).join('g')
    .attr('class','node-group')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on('click',(e,d)=>{e.stopPropagation();selectNode(d,node,link,nodeMap,allLinks,svg,zoom,W,H);})
    .on('dblclick',(e,d)=>{e.stopPropagation();zoomTo(d,svg,zoom,W,H);});

  node.append('circle').attr('class','node-ring').attr('r',d=>d.r+6).attr('stroke',d=>nodeColor(d));
  node.append('circle').attr('class','node-circle').attr('r',d=>d.r).attr('fill',d=>nodeColor(d)).attr('opacity',d=>hierIds.includes(d.id)?0.9:0.8).style('filter',d=>`drop-shadow(0 2px 10px ${nodeColor(d)}55)`);
  node.append('text').attr('class','node-label').attr('dy','0.35em')
    .each(function(d){const sel=d3.select(this);const lines=(d.label||'').split('\n');sel.selectAll('tspan').remove();lines.forEach((line,i)=>sel.append('tspan').attr('x',0).attr('dy',i===0?(lines.length>1?'-0.3em':'0'):'1.2em').text(line));});

  sim.on('tick',()=>{ link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y); node.attr('transform',d=>`translate(${d.x},${d.y})`); });

  const legendEl=document.getElementById('legend');
  legendEl.innerHTML='';
  Object.entries(CAT).forEach(([key,val])=>{legendEl.innerHTML+=`<div class="legend-item" data-cat="${key}"><div class="legend-dot" style="background:${val.color}"></div>${val.label}</div>`;});
  let focusedCat=null;
  document.querySelectorAll('.legend-item').forEach(item=>{
    item.addEventListener('click',()=>{const cat=item.getAttribute('data-cat');if(focusedCat===cat){focusedCat=null;resetFocus(node,link);}else{focusedCat=cat;applyFocus(cat,node,link);}});
  });

  const chunkCount=nodes.filter(n=>n.cat==='chunk').length;
  const docCount=nodes.filter(n=>n.cat==='howto').length;
  document.getElementById('topbarSub').textContent=`${docCount} How-To doc${docCount!==1?'s':''} · ${chunkCount} chunks · 5-map metadata · Neela Thiagarajan`;
  document.getElementById('nodePill').textContent=`${nodes.length} nodes`;
  document.getElementById('chunkPill').textContent=`${chunkCount} chunks`;

  document.getElementById('zoom-in').addEventListener('click',()=>svg.transition().duration(180).call(zoom.scaleBy,1.3));
  document.getElementById('zoom-out').addEventListener('click',()=>svg.transition().duration(180).call(zoom.scaleBy,0.77));
  document.getElementById('zoom-reset').addEventListener('click',()=>svg.transition().duration(280).call(zoom.transform,initT));
  svg.on('click',()=>{ node.classed('selected',false);closePanel();updateBC(null); link.style('stroke',null).style('stroke-width',null).attr('opacity',1); });
  document.getElementById('panel-close').addEventListener('click',closePanel);
  document.getElementById('toast-close').addEventListener('click',()=>document.getElementById('toast').classList.remove('open'));

  window.selectAndZoom=id=>{const d=nodeMap[id];if(!d)return;selectNode(d,node,link,nodeMap,allLinks,svg,zoom,W,H);zoomTo(d,svg,zoom,W,H);};

  const hierSpine=hierIds.filter(id=>nodeMap[id]);
  const demos=[];
  nodes.filter(n=>n.cat==='howto').forEach(ht=>{
    const docChunks=nodes.filter(n=>n.cat==='chunk'&&n.doc_id===ht.doc_id);
    const intentMap={};
    docChunks.forEach(c=>{if(!intentMap[c.intent])intentMap[c.intent]=c;});
    const sysNodes=nodes.filter(n=>n.cat==='system').slice(0,2).map(n=>n.id);
    const datNodes=nodes.filter(n=>n.cat==='data').slice(0,2).map(n=>n.id);
    const procNodes=nodes.filter(n=>n.cat==='process').slice(0,2).map(n=>n.id);
    const l5id=nodes.find(n=>n.cat==='l5'&&n.children&&n.children.includes(ht.id))?.id;
    const spine=[...hierSpine,l5id,ht.id].filter(Boolean);
    const docTitle=ht.docTitle||ht.doc_id;
    const shortTitle=docTitle.replace(/^How to (Create |Set Up |Manage )?/i,'').replace(/ in .*/i,'').trim();
    if(intentMap['DO']) demos.push({value:`${ht.doc_id}-do`,label:`How do I create a ${shortTitle}?`,path:[...spine,intentMap['DO'].id,...sysNodes.slice(0,1),...datNodes.slice(0,2)].filter(id=>nodeMap[id]),title:`Retrieval: DO intent → ${intentMap['DO'].id}`,body:`Query routed to DO intent. Path: hierarchy spine → ${ht.doc_id} → steps chunk. 5-map context adds systems and data entities.`});
    if(intentMap['FIX']) demos.push({value:`${ht.doc_id}-fix`,label:`${shortTitle} — something not working`,path:[...spine,intentMap['FIX'].id,...sysNodes,...datNodes.slice(0,1)].filter(id=>nodeMap[id]),title:`Retrieval: FIX intent → ${intentMap['FIX'].id}`,body:`Query routed to FIX intent. Response contract: Problem / Cause / Fix.`});
    if(intentMap['CONSTRAINT']) demos.push({value:`${ht.doc_id}-constraint`,label:`${shortTitle} — critical rules`,path:[...spine,intentMap['CONSTRAINT'].id,...sysNodes.slice(0,1),...datNodes].filter(id=>nodeMap[id]),title:`Retrieval: CONSTRAINT intent → ${intentMap['CONSTRAINT'].id}`,body:`Query routed to CONSTRAINT intent. Response contract: bullet list of rules, each with explicit impact if violated.`});
    if(intentMap['CHECK']) demos.push({value:`${ht.doc_id}-check`,label:`${shortTitle} — what do I need first?`,path:[...spine,intentMap['CHECK'].id,...sysNodes.slice(0,1),...datNodes.slice(0,2)].filter(id=>nodeMap[id]),title:`Retrieval: CHECK intent → ${intentMap['CHECK'].id}`,body:`Query routed to CHECK intent. Response contract: checkbox-style checklist.`});
    if(intentMap['LEARN']) demos.push({value:`${ht.doc_id}-learn`,label:`What is a ${shortTitle}?`,path:[...spine,intentMap['LEARN'].id,...procNodes.slice(0,1)].filter(id=>nodeMap[id]),title:`Retrieval: LEARN intent → ${intentMap['LEARN'].id}`,body:`Query routed to LEARN intent. Response contract: concise prose, 3-5 sentences per concept.`});
  });

  const select=document.getElementById('demo-query');
  select.innerHTML='';
  if(demos.length===0){const opt=document.createElement('option');opt.textContent='No demos available';select.appendChild(opt);}
  else{demos.forEach(d=>{const opt=document.createElement('option');opt.value=d.value;opt.textContent=d.label;select.appendChild(opt);});}

  document.getElementById('demo-search').addEventListener('click',()=>{
    const val=select.value;const demo=demos.find(d=>d.value===val);
    if(!demo) return;
    showToast(demo.title,demo.body);
    highlightPath(demo.path,node,link,nodeMap,allLinks,svg,zoom,W,H);
  });

  document.getElementById('loading-overlay').style.display='none';
}

function highlightPath(ids,node,link,nodeMap,allLinks,svg,zoom,W,H){
  const set=new Set(ids);
  node.selectAll('.node-circle').attr('opacity',d=>set.has(d.id)?1:0.06);
  node.selectAll('.node-label').attr('opacity',d=>set.has(d.id)?1:0.04);
  link.attr('opacity',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(set.has(s)&&set.has(t))?1:0.03;}).style('stroke-width',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(set.has(s)&&set.has(t))?2.5:1;});
  let i=0;
  const chunkNode=ids.map(id=>nodeMap[id]).find(d=>d&&d.cat==='chunk');
  const totalDuration=ids.length*650;
  const timer=setInterval(()=>{if(i>=ids.length){clearInterval(timer);return;}const d=nodeMap[ids[i]];if(d){node.classed('selected',n=>n.id===d.id);zoomTo(d,svg,zoom,W,H);}i++;},650);
  setTimeout(()=>{
    if(chunkNode){
      node.classed('selected',n=>n.id===chunkNode.id);zoomTo(chunkNode,svg,zoom,W,H);
      document.getElementById('panel').classList.add('open');openPanel(chunkNode,allLinks,nodeMap);updateBC(chunkNode,nodeMap);
      const color=nodeColor(chunkNode);
      link.style('stroke',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(s===chunkNode.id||t===chunkNode.id)?color:(l.type==='cross'?'#1e1e1e':'#2a2a2a');}).style('stroke-width',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(s===chunkNode.id||t===chunkNode.id)?2.5:1;}).attr('opacity',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(s===chunkNode.id||t===chunkNode.id)?1:0.15;});
      node.selectAll('.node-circle').attr('opacity',d=>d.id===chunkNode.id?1:0.2);
    }
  },totalDuration+200);
}

function showToast(title,body){ document.getElementById('toast-title').textContent=title;document.getElementById('toast-body').textContent=body;document.getElementById('toast').classList.add('open'); }

let selectedId=null;
function selectNode(d,node,link,nodeMap,allLinks,svg,zoom,W,H){
  if(selectedId===d.id){selectedId=null;node.classed('selected',false);closePanel();updateBC(null);link.style('stroke',null).style('stroke-width',null).attr('opacity',1);return;}
  selectedId=d.id;
  node.classed('selected',n=>n.id===d.id);
  const color=nodeColor(d);
  link.style('stroke',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(s===d.id||t===d.id)?color:(l.type==='cross'?'#1e1e1e':'#2a2a2a');}).style('stroke-width',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(s===d.id||t===d.id)?2.5:1;}).attr('opacity',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(s===d.id||t===d.id)?1:0.1;});
  openPanel(d,allLinks,nodeMap);updateBC(d,nodeMap);
}

function zoomTo(d,svg,zoom,W,H){const t=d3.zoomTransform(svg.node());const k=Math.min(2.0,Math.max(0.7,t.k));svg.transition().duration(420).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(k).translate(-d.x,-d.y));}

function openPanel(d,allLinks,nodeMap){
  document.getElementById('panel').classList.add('open');
  const color=nodeColor(d);
  const badge=`<div class="panel-badge" style="background:${color}15;color:${color};border:1px solid ${color}30">${CAT[d.cat]?.label||d.cat}</div>`;
  const title=(d.label||'').replace(/\n/g,' ');
  const connected=allLinks.filter(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return s===d.id||t===d.id;});
  let metaHtml='';
  if(d.cat==='chunk'){
    metaHtml=`<div class="meta-grid"><div class="meta"><span class="k">Section</span>${d.section||'—'}</div><div class="meta"><span class="k">Intent</span>${d.intent||'—'}</div><div class="meta"><span class="k">Doc</span>${d.doc_id||'—'}</div><div class="meta"><span class="k">Connections</span>${connected.length}</div></div>${d.keywords?.length?`<div class="chiprow">${d.keywords.map(k=>`<span class="chip">${k}</span>`).join('')}</div>`:''} ${d.process_stage?`<div class="panel-section-label">Process stage</div><div style="font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace">${d.process_stage}</div>`:''} ${d.content?`<div class="panel-section-label">Content preview</div><div class="preview">${escHtml(d.content.substring(0,400))}${d.content.length>400?'…':''}</div>`:''}`;
  } else {
    metaHtml=`<div class="meta-grid"><div class="meta"><span class="k">Type</span>${CAT[d.cat]?.label||d.cat}</div><div class="meta"><span class="k">Connections</span>${connected.length}</div></div>`;
  }
  const relNodes=connected.map(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;const other=nodeMap[s===d.id?t:s];return other?{other,label:l.label||''}:null;}).filter(Boolean);
  const relHtml=relNodes.length?`<div class="panel-section-label">Connected nodes</div><div class="panel-children">${relNodes.slice(0,14).map(x=>{const c=nodeColor(x.other);const lbl=(x.other.label||'').replace(/\n/g,' ');return`<div class="panel-child" onclick="selectAndZoom('${x.other.id}')"><div class="child-dot" style="background:${c}"></div><div><div class="child-label">${lbl}</div><div class="child-sub">${x.label} · ${CAT[x.other.cat]?.label||x.other.cat}</div></div></div>`;}).join('')}</div>`:'';
  document.getElementById('panel-content').innerHTML=`${badge}<div class="panel-title">${title}</div><div class="panel-desc">${d.desc||''}</div>${metaHtml}${relHtml}`;
}

function closePanel(){ document.getElementById('panel').classList.remove('open'); }

function updateBC(d,nodeMap){
  const el=document.getElementById('breadcrumb');
  if(!d){el.innerHTML='';return;}
  const path=[];let cur=d;
  while(cur){path.unshift(cur);cur=cur.parent&&nodeMap?nodeMap[cur.parent]:null;}
  el.innerHTML=path.map((n,i)=>{const cls=i===path.length-1?'bc-item active':'bc-item';const lbl=(n.label||'').replace(/\n/g,' ');return`<span class="${cls}" onclick="selectAndZoom('${n.id}')">${lbl}</span>`+(i<path.length-1?`<span class="sep">›</span>`:'');}).join('')+(d.intent?` <span class="sep">›</span><span style="color:${nodeColor(d)}88;font-size:9px;font-family:'DM Mono',monospace">${d.intent}</span>`:'');
}

function applyFocus(cat,node,link){node.selectAll('.node-circle').attr('opacity',d=>d.cat===cat?1:0.05);node.selectAll('.node-label').attr('opacity',d=>d.cat===cat?1:0.04);link.attr('opacity',l=>((l.source.cat===cat)||(l.target.cat===cat))?0.9:0.04);}
function resetFocus(node,link){node.selectAll('.node-circle').attr('opacity',0.8);node.selectAll('.node-label').attr('opacity',1);link.attr('opacity',1);}
function escHtml(s){return(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');}

async function init(){
  try {
    const manifestRes=await fetch('knowledge_base/manifest.json');
    if(!manifestRes.ok) throw new Error('manifest.json not found');
    const manifest=await manifestRes.json();
    document.getElementById('loadingMsg').textContent=`⟳ Loading ${manifest.docs.length} document${manifest.docs.length!==1?'s':''}...`;
    const docs=[];
    for(const filename of manifest.docs){try{const res=await fetch(`knowledge_base/${filename}`);if(res.ok) docs.push(await res.json());}catch(e){console.warn(`Failed to load ${filename}`);}}
    if(!docs.length) throw new Error('No documents loaded');
    renderGraph(docs);
  } catch(e){
    document.getElementById('loadingMsg').textContent=`⚠️ ${e.message}. Make sure knowledge_base/manifest.json exists.`;
    console.error(e);
  }
}
init();
</script>
</body>
</html>
